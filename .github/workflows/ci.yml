name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contract:
    name: Validate contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Normalize (must be a no-op)
        working-directory: packages/contract
        run: |
          cp openapi.json /tmp/before.json
          pnpm normalize
          diff /tmp/before.json openapi.json

      - name: Lint OpenAPI
        working-directory: packages/contract
        run: pnpm lint

      - name: Run contract tests
        working-directory: packages/contract
        run: pnpm test

      - name: Setup oasdiff
        env:
          OASDIFF_VERSION: "1.16.0"
        run: |
          # The repo moved from Tufin/oasdiff to oasdiff/oasdiff and the
          # release assets now include the version in their filename.
          # Pinning to a specific version is more reliable than "latest".
          os=$(uname -s | tr '[:upper:]' '[:lower:]')
          curl -fL "https://github.com/oasdiff/oasdiff/releases/download/v${OASDIFF_VERSION}/oasdiff_${OASDIFF_VERSION}_${os}_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin oasdiff
          oasdiff --version

      - name: Check breaking changes
        working-directory: packages/contract
        run: pnpm check:breaking

  node-build:
    name: Node SDK build & test
    runs-on: ubuntu-latest
    needs: contract
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate types
        working-directory: packages/node
        run: pnpm generate

      - name: Verify generated diff is empty
        run: git diff --exit-code packages/node/src/generated

      - name: Build
        working-directory: packages/node
        run: pnpm build

      - name: Run tests
        working-directory: packages/node
        run: pnpm test

  generated-resources:
    name: Validate generated SDK resources
    runs-on: ubuntu-latest
    needs: contract
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Node types and SDK resources
        run: |
          pnpm --filter @easymailing/sdk generate
          pnpm --filter @easymailing/api-contract generate:resources

      - name: Verify generated resource diff is empty
        run: git diff --exit-code packages/node/src/generated packages/php/src/Generated/Resources packages/node/docs/resources.md packages/php/docs/resources.md

  php-dtos:
    name: Validate PHP generated DTOs
    runs-on: ubuntu-latest
    needs: contract
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Composer install
        working-directory: packages/php
        run: composer install --prefer-dist --no-progress

      - name: Generate DTOs
        working-directory: packages/php
        run: composer generate

      - name: Verify generated diff is empty
        run: git diff --exit-code packages/php/src/Generated

      - name: Lint generated PHP syntax
        working-directory: packages/php
        run: |
          for f in src/Generated/Dto/*.php src/Generated/Enum/*.php src/Generated/Resources/*.php; do
            php -l "$f" > /dev/null || (echo "SYNTAX ERROR in $f"; exit 1)
          done

      - name: Run generator tests
        working-directory: packages/php
        run: composer test

      - name: PHPStan level 8
        working-directory: packages/php
        # PHPStan needs more than the default 128M to analyse the full DTO set.
        # Keep this in sync with the local `composer analyse` invocation.
        run: vendor/bin/phpstan analyse src tests --level=8 --memory-limit=512M --no-progress

