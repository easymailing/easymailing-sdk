name: Release Node

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release @easymailing/sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build Node SDK
        run: pnpm --filter @easymailing/sdk build

      - name: Create release PR (changesets, no publish)
        id: changesets
        uses: changesets/action@v1
        with:
          # Only handle the Version Packages PR side; publish is done by the
          # explicit npm publish step below so npm's OIDC handshake (which
          # pnpm/changesets doesn't always pass through correctly) is exercised
          # directly by npm CLI.
          version: pnpm changeset version
          # No publish field → changesets-action returns `hasChangesets`
          # without attempting to publish.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @easymailing/sdk via npm OIDC
        # Run only when there are no pending changesets, i.e. the just-merged
        # commit consumed the Version Packages PR and bumped the version on
        # main. We then publish whatever is in packages/node/package.json
        # provided that version is not already on the registry.
        if: steps.changesets.outputs.hasChangesets == 'false'
        working-directory: packages/node
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          REMOTE=$(npm view @easymailing/sdk@$PKG_VERSION version 2>/dev/null || echo "")
          if [ "$REMOTE" = "$PKG_VERSION" ]; then
            echo "@easymailing/sdk@$PKG_VERSION already on npm — skipping."
            exit 0
          fi
          echo "Publishing @easymailing/sdk@$PKG_VERSION via npm (OIDC Trusted Publishing)..."
          npm publish --access public
