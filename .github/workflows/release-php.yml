name: Release PHP

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          # Use SDK_BOT_TOKEN (PAT) instead of GITHUB_TOKEN so tag-push
          # events created by this action trigger downstream workflows
          # (split-php.yml). GitHub deliberately blocks workflows from
          # being triggered by events created by GITHUB_TOKEN to avoid
          # recursive runs, but PAT-created events fire normally.
          token: ${{ secrets.SDK_BOT_TOKEN }}
